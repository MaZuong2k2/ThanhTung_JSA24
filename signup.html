<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/signup.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="form-box">

            <h2 class="text-center mb-4">Đăng Ký</h2>

            <form onsubmit="return validateForm()">

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Họ tên" required>
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Tên đăng nhập" required>
                </div>

                <div class="mb-3">
                    <input type="text" id="email" class="form-control" placeholder="Email" required>
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Mật khẩu" required>
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Đăng Ký
                </button>

            </form>

        </div>
    </div>

    <script src="./js/signup.js"></script>
</body>
</html>
